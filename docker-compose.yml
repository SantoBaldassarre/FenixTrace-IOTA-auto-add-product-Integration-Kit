services:
  fenixtrace-kit:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fenixtrace-integration-kit
    ports:
      - "${PORT:-3005}:3005"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./uploads:/app/uploads
      - ./processed:/app/processed
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
